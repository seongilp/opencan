name: OpenCan
options:
  bundleIdPrefix: com.opencan
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  OpenCanCore:
    path: .
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"
targets:
  OpenCan:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: OpenCanCore
        product: OpenCanCore
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opencan.app
        PRODUCT_NAME: OpenCan
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
