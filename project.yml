name: LocalPort
options:
  bundleIdPrefix: com.localport
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  LocalPortCore:
    path: .
targets:
  LocalPort:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: LocalPortCore
        product: LocalPortCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localport.app
        PRODUCT_NAME: LocalPort
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
